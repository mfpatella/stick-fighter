<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Stick Figure Fighter Offline</title>
    <style>
      :root {
        color: #1f2428;
        background: #f7f3e8;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 24%, rgb(199 157 59 / 26%), transparent 13rem),
          linear-gradient(180deg, #dbe6df 0%, #f7f3e8 100%);
      }

      main {
        max-width: 420px;
        border: 2px solid #202820;
        border-radius: 8px;
        padding: 20px;
        background: rgb(255 250 237 / 92%);
        box-shadow: 0 12px 28px rgb(32 40 32 / 14%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: #58635c;
        font-weight: 700;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Stick Fighter is offline</h1>
      <p>The game shell is saved on this phone. Reconnect and reload to sync lobbies, accounts, and online fights.</p>
    </main>
  </body>
</html>
